<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 200" role="img" aria-label="Quiver — security-first, memory-frugal vector database">
  <title>Quiver</title>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="3" y2="0" stroke="#FFB000" stroke-width="1" opacity="0.05"/>
    </pattern>
    <g id="qa" stroke="#FFB000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="0" y1="2" x2="0" y2="-60"/>
      <path d="M -10 -47 L 0 -62 L 10 -47"/>
      <path d="M -8 -2 L 0 -11 L 8 -2"/>
    </g>
  </defs>

  <!-- CRT panel -->
  <rect x="2" y="2" width="736" height="196" rx="18" fill="#0a0c0b" stroke="#FFB000" stroke-opacity="0.35" stroke-width="2"/>
  <rect x="2" y="2" width="736" height="196" rx="18" fill="url(#scan)"/>

  <!-- window dots -->
  <g opacity="0.7">
    <circle cx="30" cy="28" r="4.5" fill="#FFB000"/>
    <circle cx="46" cy="28" r="4.5" fill="#FFB000" fill-opacity="0.45"/>
    <circle cx="62" cy="28" r="4.5" fill="#FFB000" fill-opacity="0.45"/>
  </g>

  <!-- emblem: a fan of three vectors from one origin (the quiver) -->
  <g filter="url(#glow)" transform="translate(96 116) scale(0.92)">
    <use href="#qa" transform="rotate(-25) scale(0.92)" opacity="0.78"/>
    <use href="#qa" transform="rotate(22) scale(0.86)" opacity="0.78"/>
    <use href="#qa" transform="rotate(-2) scale(1.06)"/>
    <ellipse cx="0" cy="1" rx="15" ry="4.6" fill="none" stroke="#FFB000" stroke-width="5"/>
    <circle cx="0" cy="1" r="3.4" fill="#FFD166"/>
  </g>

  <!-- wordmark + tagline -->
  <g filter="url(#glow)" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
    <text x="196" y="104" font-size="62" font-weight="700" letter-spacing="9" fill="#FFB000">QUIVER</text>
    <text x="198" y="146" font-size="19" letter-spacing="1.5" fill="#FFB000" fill-opacity="0.66"><tspan fill="#FFD166" font-weight="700">›</tspan> security-first · memory-frugal · vector search</text>
  </g>
</svg>
