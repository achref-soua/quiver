# cargo-deny policy. Run via `just deny`. Schema: v2.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
# The allow-list is forward-looking (deps land over Phase 1+); don't warn on
# licenses not yet encountered.
unused-allowed-license = "allow"
allow = [
    "AGPL-3.0-only", # Quiver's own crates
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
