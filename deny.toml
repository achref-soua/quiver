# cargo-deny policy. Run via `just deny`. Schema: v2.

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `time` is pulled only by `rcgen`, a dev-dependency used to generate
    # self-signed certificates in the TLS tests. It is never compiled into the
    # `quiver` binary or any library artifact, the stack-exhaustion path (parsing
    # adversarial format descriptions) is not exercised by deterministic cert
    # generation, and no `time` release that fixes it supports our MSRV (1.85).
    { id = "RUSTSEC-2026-0009", reason = "dev-only (rcgen test certs); no MSRV-1.85-compatible fix; vulnerable path unused" },
    # `paste` is an *unmaintained* (not vulnerable) compile-time proc-macro pulled
    # transitively by `ratatui` (the cockpit's renderer). It never ships in the
    # binary; there is no maintained drop-in at ratatui's pinned version yet.
    { id = "RUSTSEC-2024-0436", reason = "unmaintained proc-macro via ratatui; compile-time only, not in any artifact" },
]

[licenses]
version = 2
confidence-threshold = 0.9
# The allow-list is forward-looking (deps land over Phase 1+); don't warn on
# licenses not yet encountered.
unused-allowed-license = "allow"
allow = [
    "AGPL-3.0-only", # Quiver's own crates
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
