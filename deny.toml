# cargo-deny policy. Run via `just deny`. Schema: v2.

[advisories]
version = 2
yanked = "deny"
# No suppressions: the dependency tree is advisory-clean. (Updating ratatui to
# 0.30 resolved the earlier transitive advisories — it pulls a patched `lru`
# >= 0.16.3 for RUSTSEC-2026-0002 and no longer depends on the unmaintained
# `paste` of RUSTSEC-2024-0436; the dev-only `time` advisory cleared too.)
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
# The allow-list is forward-looking (deps land over Phase 1+); don't warn on
# licenses not yet encountered.
unused-allowed-license = "allow"
allow = [
    "AGPL-3.0-only", # Quiver's own crates
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
