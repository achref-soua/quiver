{{- /* Chart-managed Secret: created unless an external one is referenced. */}}
{{- if not .Values.encryption.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "quiver.fullname" . }}-secrets
  labels:
    {{- include "quiver.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and (not .Values.encryption.insecure) .Values.encryption.masterKey }}
  master.key: {{ .Values.encryption.masterKey | quote }}
  {{- end }}
  {{- if .Values.apiKeys }}
  api-keys: {{ .Values.apiKeys | quote }}
  {{- end }}
{{- end }}
