// SPDX-License-Identifier: AGPL-3.0-only
//
// The Quiver gRPC contract — the source of truth for the API (ADR-0018). The
// REST surface mirrors it (docs/api/rest-grpc.md). Phase 1 ships the unary
// subset; client-streaming Upsert, BatchSearch, key admin, and a structured
// Filter message are later additions. Filters are carried as JSON bytes
// (the quiver-query Filter, serialized) in Phase 1.

syntax = "proto3";

package quiver.v1;

service Quiver {
  rpc CreateCollection(CreateCollectionRequest) returns (Collection);
  rpc GetCollection(GetCollectionRequest) returns (Collection);
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteCollectionResponse);

  rpc Upsert(UpsertRequest) returns (UpsertResponse);
  rpc DeletePoints(DeletePointsRequest) returns (DeletePointsResponse);
  rpc GetPoints(GetPointsRequest) returns (GetPointsResponse);

  rpc Search(SearchRequest) returns (SearchResponse);

  // Fetch points without server-side ranking — the retrieval path for
  // client-side-encrypted collections (ADR-0032); the client decrypts and ranks.
  rpc Fetch(FetchRequest) returns (FetchResponse);

  // Multi-vector (late-interaction / ColBERT) documents (ADR-0028).
  rpc UpsertMultiVector(UpsertMultiVectorRequest) returns (UpsertMultiVectorResponse);
  rpc SearchMultiVector(SearchMultiVectorRequest) returns (SearchMultiVectorResponse);
  rpc DeleteDocuments(DeleteDocumentsRequest) returns (DeleteDocumentsResponse);

  // Leader-follower replication (ADR-0030): stream the committed operation log to
  // a read-replica follower. Admin-scoped.
  rpc Replicate(ReplicateRequest) returns (stream ReplicationOp);
}

// Distance / similarity metric.
enum Metric {
  METRIC_UNSPECIFIED = 0;
  METRIC_L2 = 1;
  METRIC_COSINE = 2;
  METRIC_DOT = 3;
}

// The index structure a collection is served by (ADR-0007). UNSPECIFIED is
// treated as the default (in-memory HNSW).
enum IndexKind {
  INDEX_KIND_UNSPECIFIED = 0;
  INDEX_KIND_HNSW = 1;
  INDEX_KIND_VAMANA = 2;
  INDEX_KIND_DISK_VAMANA = 3;
  INDEX_KIND_IVF = 4;
  // ColBERTv2/PLAID compressed token-pool index (ADR-0034); multi-vector only.
  INDEX_KIND_COLBERT = 5;
}

// The value type of a filterable payload field (ADR-0022), which fixes how it is
// keyed in the secondary index. UNSPECIFIED is treated as KEYWORD.
enum FieldType {
  FIELD_TYPE_UNSPECIFIED = 0;
  FIELD_TYPE_KEYWORD = 1;
  FIELD_TYPE_NUMERIC = 2;
}

// How a collection's vectors are encrypted, always client-side (ADR-0031,
// ADR-0032). The discriminants match the former `bool encrypted_vectors`
// (false = NONE, true = DCPE) so the wire stays compatible.
enum VectorEncryption {
  VECTOR_ENCRYPTION_NONE = 0;
  VECTOR_ENCRYPTION_DCPE = 1;
  VECTOR_ENCRYPTION_CLIENT_SIDE = 2;
}

// A payload field declared filterable at collection creation, indexed for
// pre-filtered (hybrid) search.
message FilterableField {
  // Dot-path into the JSON payload (e.g. "user.age").
  string path = 1;
  FieldType field_type = 2;
}

message Collection {
  string name = 1;
  uint32 dim = 2;
  Metric metric = 3;
  uint64 count = 4;
  IndexKind index = 5;
  // Product-quantization subspaces for quantized kinds; unset = default.
  optional uint32 pq_subspaces = 6;
  // Payload fields indexed for filtering.
  repeated FilterableField filterable = 7;
  // Whether this is a multi-vector (late-interaction / ColBERT) collection.
  bool multivector = 8;
  // How this collection's vectors are encrypted (ADR-0031, ADR-0032): NONE
  // (plaintext, server ranks), DCPE (server ranks ciphertexts, leaks distance
  // ordering by design), or CLIENT_SIDE (opaque AEAD, server does not rank).
  VectorEncryption vector_encryption = 9;
}

message CreateCollectionRequest {
  string name = 1;
  uint32 dim = 2;
  Metric metric = 3;
  IndexKind index = 4;
  // Product-quantization subspaces for the disk graph / IVF+PQ; unset = default.
  optional uint32 pq_subspaces = 5;
  // Payload fields to index for pre-filtered (hybrid) search.
  repeated FilterableField filterable = 6;
  // Create a multi-vector (late-interaction / ColBERT) collection (ADR-0028),
  // whose documents are token-vector sets searched by MaxSim.
  bool multivector = 7;
  // How to encrypt this collection's vectors (ADR-0031, ADR-0032): unset/NONE =
  // plaintext; DCPE = property-preserving (requires the L2 metric); CLIENT_SIDE =
  // opaque AEAD, searched client-side.
  VectorEncryption vector_encryption = 8;
}

message GetCollectionRequest {
  string name = 1;
}

message ListCollectionsRequest {}

message ListCollectionsResponse {
  repeated Collection collections = 1;
}

message DeleteCollectionRequest {
  string name = 1;
}

message DeleteCollectionResponse {
  bool existed = 1;
}

// A point: external id, dense f32 vector, and an opaque (JSON) payload.
message Point {
  string id = 1;
  repeated float vector = 2;
  bytes payload = 3;
}

message UpsertRequest {
  string collection = 1;
  repeated Point points = 2;
}

message UpsertResponse {
  uint64 upserted = 1;
}

message DeletePointsRequest {
  string collection = 1;
  repeated string ids = 2;
}

message DeletePointsResponse {
  uint64 deleted = 1;
}

message GetPointsRequest {
  string collection = 1;
  repeated string ids = 2;
  bool with_vector = 3;
}

message GetPointsResponse {
  repeated Point points = 1;
}

message SearchRequest {
  string collection = 1;
  repeated float vector = 2;
  uint32 k = 3;
  // JSON-encoded quiver-query Filter; empty = no filter.
  bytes filter = 4;
  uint32 ef_search = 5;
  bool with_payload = 6;
  bool with_vector = 7;
}

message Match {
  string id = 1;
  float score = 2;
  bytes payload = 3;
  repeated float vector = 4;
}

message SearchResponse {
  repeated Match matches = 1;
}

// Fetch points (no ranking) with an optional cleartext payload filter and a limit
// (ADR-0032). Reuses Match; its score field is 0 for an unranked fetch.
message FetchRequest {
  string collection = 1;
  // JSON-encoded quiver-query Filter; empty = no filter.
  bytes filter = 2;
  uint32 limit = 3;
  bool with_payload = 4;
  bool with_vector = 5;
}

message FetchResponse {
  repeated Match matches = 1;
}

// A dense f32 vector — one document or query token in multi-vector search.
message Vector {
  repeated float values = 1;
}

// A multi-vector (late-interaction / ColBERT) document: an id, its set of token
// vectors, and an opaque (JSON) payload.
message MultiVectorPoint {
  string id = 1;
  repeated Vector vectors = 2;
  bytes payload = 3;
}

message UpsertMultiVectorRequest {
  string collection = 1;
  repeated MultiVectorPoint documents = 2;
}

message UpsertMultiVectorResponse {
  uint64 upserted = 1;
}

message SearchMultiVectorRequest {
  string collection = 1;
  repeated Vector query = 2;
  uint32 k = 3;
  // JSON-encoded quiver-query Filter; empty = no filter.
  bytes filter = 4;
  uint32 ef_search = 5;
  bool with_payload = 6;
  bool with_vector = 7;
}

// A multi-vector document match: id, MaxSim score, payload, and — if requested —
// the document's token vectors.
message DocumentMatch {
  string id = 1;
  float score = 2;
  bytes payload = 3;
  repeated Vector vectors = 4;
}

message SearchMultiVectorResponse {
  repeated DocumentMatch matches = 1;
}

message DeleteDocumentsRequest {
  string collection = 1;
  repeated string ids = 2;
}

message DeleteDocumentsResponse {
  uint64 deleted = 1;
}

// Leader-follower replication (ADR-0030).

// Open a replication stream. Empty for now (a full logical snapshot followed by
// the live tail); reserved for a future incremental resume point.
message ReplicateRequest {}

// One replicated operation, mirroring the engine's WalOp. The Checkpoint op is a
// per-node concern and is never streamed.
message ReplicationOp {
  // The leader's monotonic log sequence number for this op (for lag/observability).
  uint64 lsn = 1;
  oneof op {
    ReplCreateCollection create_collection = 2;
    ReplDropCollection drop_collection = 3;
    ReplUpsert upsert = 4;
    ReplDelete delete = 5;
  }
}

message ReplCreateCollection {
  uint64 collection_id = 1;
  string name = 2;
  bytes descriptor = 3; // postcard-encoded collection descriptor
}

message ReplDropCollection {
  uint64 collection_id = 1;
}

message ReplUpsert {
  uint64 collection_id = 1;
  string external_id = 2;
  bytes vector = 3; // little-endian vector element bytes (dtype per the descriptor)
  bytes payload = 4;
}

message ReplDelete {
  uint64 collection_id = 1;
  string external_id = 2;
}
