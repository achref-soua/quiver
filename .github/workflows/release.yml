# Manual-only by design (ADR-0015): dispatched with a tag at a release boundary.
name: release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.17.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: quiver-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: quiver-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: quiver-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: quiver-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p quiver-cli --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/quiver ${{ matrix.asset_name }}

      - name: Generate SHA-256 checksum
        run: |
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: quiver.spdx.json

      - name: List release assets
        run: ls -lh dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: |
            dist/quiver-linux-x86_64
            dist/quiver-linux-x86_64.sha256
            dist/quiver-linux-aarch64
            dist/quiver-linux-aarch64.sha256
            dist/quiver-macos-x86_64
            dist/quiver-macos-x86_64.sha256
            dist/quiver-macos-aarch64
            dist/quiver-macos-aarch64.sha256
            quiver.spdx.json
