# Release builds publish every supported platform binary automatically.
#
# Trigger: pushing a SemVer tag (`vMAJOR.MINOR.PATCH`) builds Linux (x86_64 +
# aarch64), macOS (x86_64 + aarch64), and Windows (x86_64) binaries, each with a
# SHA-256 checksum, then attaches them to the GitHub release for that tag. These
# are exactly what `scripts/install.sh`, `install.ps1`, and `quiver update`
# download — asset names must stay `quiver-<os>-<arch>[.exe]` + `.sha256` (the
# names are derived in crates/quiver-cli/src/update.rs).
#
# `workflow_dispatch` is kept as a manual fallback to (re)build assets for an
# existing tag without re-tagging. The manual-by-design stance for the *test*
# gates still holds (ADR-0015); release publishing is automated on tag push
# (ADR-0044).
name: release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build assets for (e.g. v0.18.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: quiver-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: quiver-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: quiver-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: quiver-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: quiver-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release -p quiver-cli --target ${{ matrix.target }}

      - name: Package binary + checksum
        # Git Bash on the Windows runner provides cp + sha256sum, so one step
        # covers every platform. The Windows binary embeds the icon via build.rs
        # (winresource, ADR-0039); the .exe suffix is the only per-OS difference.
        shell: bash
        run: |
          bin="quiver"
          [[ "${{ matrix.asset_name }}" == *.exe ]] && bin="quiver.exe"
          cp "target/${{ matrix.target }}/release/${bin}" "${{ matrix.asset_name }}"
          sha256sum "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}
            ${{ matrix.asset_name }}.sha256
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: quiver.spdx.json

      - name: Resolve release tag
        id: tag
        shell: bash
        # Tag push → github.ref_name; manual dispatch → the supplied input.
        # Passed through env (never interpolated into the script body) per the
        # GitHub Actions injection-safety guidance.
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: List release assets
        run: ls -lh dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/quiver-linux-x86_64
            dist/quiver-linux-x86_64.sha256
            dist/quiver-linux-aarch64
            dist/quiver-linux-aarch64.sha256
            dist/quiver-macos-x86_64
            dist/quiver-macos-x86_64.sha256
            dist/quiver-macos-aarch64
            dist/quiver-macos-aarch64.sha256
            dist/quiver-windows-x86_64.exe
            dist/quiver-windows-x86_64.exe.sha256
            docs/assets/icon/quiver-256.png
            quiver.spdx.json

  # ---------------------------------------------------------------------------
  # Package-registry publish jobs (ADR-0056). Each is OFF by default and only
  # runs when the owner sets the matching repository *variable* (the explicit
  # opt-in) AND provides the matching *secret* (the token). Variables are
  # readable in `if:`; secrets are passed through `env:` and never interpolated
  # into a shell. A normal tag push with none of these set publishes only the
  # GitHub-release binaries above, so the release stays green.
  # ---------------------------------------------------------------------------

  publish-crates:
    name: publish crates.io
    needs: release
    # crates.io publish in dependency-DAG order. REQUIRES the quiverdb-* namespace
    # rename first (ADR-0056): `quiver-core` and `quiver-cli` are held by unrelated
    # crates, so the package names below must be the renamed names before this can
    # succeed. The rename follow-up PR updates this list. Enable with
    # `vars.PUBLISH_CRATES=true` + `secrets.CARGO_REGISTRY_TOKEN`.
    if: ${{ vars.PUBLISH_CRATES == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish (topological order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in quiver-core quiver-simd quiver-proto quiver-query \
                       quiver-tui quiver-crypto quiver-index quiver-embed \
                       quiver-import quiver-mcp quiver-server quiver-cli; do
            echo "::group::publish ${crate}"
            cargo publish -p "${crate}"
            echo "::endgroup::"
          done

  publish-pypi:
    name: publish PyPI
    needs: release
    # quiver-client is free on PyPI (verified) — ready once the token is set.
    # Enable with `vars.PUBLISH_PYPI=true` + `secrets.PYPI_API_TOKEN`.
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build + publish the Python SDK
        working-directory: sdks/python
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uvx twine check dist/*
          uv publish

  publish-npm:
    name: publish npm
    needs: release
    # quiver-client is free on npm (verified) — ready once the token is set.
    # Enable with `vars.PUBLISH_NPM=true` + `secrets.NPM_TOKEN`.
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build + publish the TypeScript SDK
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npm publish --access public
