# Runs automatically on pull requests and on pushes to main/develop, with a
# manual `workflow_dispatch` fallback. Mirrors the local `just verify` gate,
# which stays the fast pre-commit check (ADR-0015).
name: ci
on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: fmt · clippy · test · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (warnings denied)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (optional otlp feature — keeps the gated exporter from rotting)
        run: cargo clippy -p quiverdb-server --features otlp --all-targets -- -D warnings
      - name: Clippy (optional raft feature — keeps the gated consensus adapter from rotting)
        run: cargo clippy -p quiverdb-server --features raft --all-targets -- -D warnings
      - name: Clippy (optional cuda feature — build-only; keeps the gated GPU kernel from rotting)
        # cudarc dynamically loads the CUDA driver at runtime, so the feature
        # *compiles* without a CUDA toolchain. The GPU is validated on real hardware
        # locally — it cannot run on the GPU-less CI runner, so this only builds it.
        run: cargo clippy -p quiverdb-index --features cuda --all-targets -- -D warnings
      - name: Format + clippy (cockpit-shots — its own workspace, not in --workspace above)
        run: |
          cargo fmt --manifest-path tools/cockpit-shots/Cargo.toml --check
          cargo clippy --manifest-path tools/cockpit-shots/Cargo.toml --all-targets -- -D warnings
      - name: Test (workspace, excluding the crash-recovery stress test)
        run: cargo test --workspace -- --skip kill_mid_write_preserves_acknowledged_writes
      - name: Test (optional raft feature — consensus adapter + server wiring)
        # The `raft` filter (substring) runs the in-process/gRPC adapter unit
        # tests (`raft::…`) and the `raft_cluster` server-wiring failover test.
        run: "cargo test -p quiverdb-server --features raft raft"
      - name: Crash-recovery stress test (retried — kill -9 timing is runner-sensitive)
        # The kill-mid-write gate SIGKILLs a writer at randomized points and asserts
        # recovery. A genuine recovery regression is deterministic and fails every
        # attempt (so the job still fails and you are notified); a rare transient
        # reopen error under the runner's virtualized I/O timing passes on a retry,
        # so it no longer fails the job on a false positive. The test surfaces the
        # underlying error + on-disk state when it does fail (see the test source).
        run: |
          for attempt in 1 2 3; do
            echo "::group::crash_recovery attempt ${attempt}"
            if cargo test -p quiverdb-core --test crash_recovery; then
              echo "::endgroup::"
              echo "crash_recovery passed on attempt ${attempt}"
              exit 0
            fi
            echo "::endgroup::"
            echo "crash_recovery attempt ${attempt} failed"
          done
          echo "crash_recovery failed all attempts — a real recovery regression" >&2
          exit 1
      - name: Docs
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  package:
    name: package (publishability)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # `--no-verify` skips the registry verification build (a dependent crate's
      # deps are not on crates.io yet — the chicken-and-egg the first publish
      # resolves), so this checks the crate metadata and that every crate packages
      # cleanly. It fails the moment a crate loses `description`/`license`/… (ADR-0056).
      - name: cargo package (metadata + tarball)
        run: cargo package --workspace --no-verify

      - uses: astral-sh/setup-uv@v7
      - name: Build + check the Python SDK distribution
        working-directory: sdks/python
        run: |
          uv build
          uvx twine check dist/*

      - uses: pnpm/action-setup@v6
        with:
          version: "11.6.0" # matches packageManager; pnpm 11 needs Node >= 22.13
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build + dry-run pack the TypeScript SDK
        working-directory: sdks/typescript
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          npm pack --dry-run

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
      - name: Helm lint
        run: helm lint infra/helm/quiver --set encryption.masterKey="$(openssl rand -hex 32)"
      - name: Helm template (with key)
        run: helm template q infra/helm/quiver --set encryption.masterKey="$(openssl rand -hex 32)" > /dev/null
      - name: Helm template (insecure)
        run: helm template q infra/helm/quiver --set encryption.insecure=true > /dev/null
