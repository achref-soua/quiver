# Manual-only by design (ADR-0015). Mirrors the `just deny` / `just audit` gate.
name: security
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  supply-chain:
    name: cargo-deny · cargo-audit · gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - name: cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
