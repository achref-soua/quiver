name: visual-recap

# After a release publishes, build a visual recap (montage + gallery) from the
# cockpit screenshots committed at the tag, attach it as release assets, and append
# the gallery to the release notes. Re-runnable: the notes block is replaced, not duplicated.
#
# Triggered via workflow_run (not `release: published`) because release.yml creates the
# release with the Actions GITHUB_TOKEN, and token-created releases do not chain to other
# workflows. The tag is resolved from the just-published latest release.

on:
  workflow_run:
    workflows: [release]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to (re)build the recap for
        required: true

permissions:
  contents: write

jobs:
  recap:
    # Only on a successful release run, or a manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      # Resolve the tag (manual input, else the latest published release) and validate it
      # to a strict charset before it is ever used in a shell command or a checkout ref.
      - name: Resolve and validate tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = workflow_dispatch ]; then
            RAW_TAG="$INPUT_TAG"
          else
            RAW_TAG="$(gh release view --repo "$REPO" --json tagName -q .tagName)"
          fi
          if ! printf '%s' "$RAW_TAG" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*$'; then
            echo "refusing unsafe or empty tag: $RAW_TAG" >&2
            exit 1
          fi
          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Build montage + gallery
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: bash .github/scripts/visual-recap.sh "$TAG"

      - name: Attach assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh release upload "$TAG" out/recap/quiver-visual-recap.png out/recap/visual-recap.md --clobber

      - name: Append gallery to release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --json body -q .body > body.md || : > body.md
          # Drop any previous recap block so re-runs don't duplicate it.
          sed -i '/<!-- visual-recap -->/,$d' body.md
          printf '\n\n' >> body.md
          cat out/recap/visual-recap.md >> body.md
          gh release edit "$TAG" --notes-file body.md
