name: visual-recap

# On every published release, build a visual recap (montage + gallery) from the
# cockpit screenshots committed at the tag, attach it as release assets, and append
# the gallery to the release notes. Re-runnable: the notes block is replaced, not duplicated.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to (re)build the recap for
        required: true

permissions:
  contents: write

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      # Route untrusted event input through env, then validate to a strict tag
      # charset before it is ever used in a shell command or a checkout ref.
      - name: Resolve and validate tag
        id: tag
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$RAW_TAG" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*$'; then
            echo "refusing unsafe tag: $RAW_TAG" >&2
            exit 1
          fi
          echo "tag=$RAW_TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Build montage + gallery
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: bash .github/scripts/visual-recap.sh "$TAG"

      - name: Attach assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh release upload "$TAG" out/recap/quiver-visual-recap.png out/recap/visual-recap.md --clobber

      - name: Append gallery to release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --json body -q .body > body.md || : > body.md
          # Drop any previous recap block so re-runs don't duplicate it.
          sed -i '/<!-- visual-recap -->/,$d' body.md
          printf '\n\n' >> body.md
          cat out/recap/visual-recap.md >> body.md
          gh release edit "$TAG" --notes-file body.md
