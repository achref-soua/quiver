name: ✨ Feature request
description: Suggest a capability or improvement.
title: "feat: <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please search existing issues and the roadmap (`docs/roadmap.md`) first.
        Quiver competes on a narrow, deliberate edge — security, memory frugality, and developer
        experience — so proposals that sharpen that edge are most likely to land.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what makes it hard today?
      placeholder: I want to … but currently …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Quiver do? Sketch the API/CLI/config surface if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why they fall short.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Fit with Quiver's scope
      options:
        - label: This keeps Quiver a single static binary (no heavy new runtime dependency), or I've explained why the trade-off is worth it.
        - label: I understand distributed clustering and homomorphic-encrypted search are explicit non-goals for v1 (see the README).
