# Dependabot keeps dependencies current with weekly PRs. Cargo and GitHub Actions
# are the load-bearing ecosystems; the SDKs (pip/npm) are covered too so their
# lockfiles do not drift. Grouped to keep PR volume sane.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

    ignore:
      # RustCrypto majors (aead/cipher/digest traits move together) must be upgraded
      # as one coordinated stack with on-disk-format + cross-language KAT + crash-gate
      # re-verification, never merged piecemeal (see closed PRs #349-352). Minor/patch
      # still flow through the cargo-minor-patch group above.
      - dependency-name: "chacha20"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chacha20poly1305"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hmac"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hkdf"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sha2"
        update-types: ["version-update:semver-major"]
      - dependency-name: "digest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "cipher"
        update-types: ["version-update:semver-major"]
      - dependency-name: "aead"
        update-types: ["version-update:semver-major"]
      - dependency-name: "cudarc"
        update-types: ["version-update:semver-major"]
      - dependency-name: "webpki-roots"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/sdks/python"
    target-branch: "develop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: "/sdks/typescript"
    target-branch: "develop"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
